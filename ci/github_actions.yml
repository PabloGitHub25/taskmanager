name: CI/CD Pipeline - Task Manager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  APP_ENV: test
  PYTHON_VERSION: "3.11"

jobs:
  # ─── JOB 1: BUILD ─────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          pip install -r app/requirements.txt

      - name: Verificar sintaxis Python
        run: python -m py_compile app/app.py

  # ─── JOB 2: TEST ──────────────────────────────
  test:
    name: Pruebas Automatizadas
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: pip install -r app/requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          pytest tests/ -v --tb=short

  # ─── JOB 3: DEPLOY (conceptual) ───────────────
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy manual estructurado
        run: |
          echo "Desplegando versión ${{ github.sha }} a producción..."
          bash scripts/run.sh prod
