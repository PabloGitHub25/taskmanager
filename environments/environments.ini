# ================================================
# GESTIÓN DE AMBIENTES - TASK MANAGER
# ================================================

# ─── AMBIENTE: DEV ────────────────────────────
[dev]
ENV=dev
PORT=5000
DEBUG=true
LOG_LEVEL=DEBUG
HOST=localhost
DESCRIPCION=Desarrollo local - debug activo, logs verbosos

# ─── AMBIENTE: TEST ───────────────────────────
[test]
ENV=test
PORT=5001
DEBUG=false
LOG_LEVEL=INFO
HOST=localhost
DESCRIPCION=Pruebas automatizadas - datos efímeros, sin efectos externos

# ─── AMBIENTE: PROD ───────────────────────────
[prod]
ENV=prod
PORT=8080
DEBUG=false
LOG_LEVEL=WARNING
HOST=0.0.0.0
DESCRIPCION=Producción - optimizado, sin debug, HTTPS recomendado
